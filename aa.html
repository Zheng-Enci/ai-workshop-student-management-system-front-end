<!DOCTYPE html>
<html lang="zh-CN">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>时间滑动选择器</title>
	<!-- 引入Vant样式 -->
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/vant@2.12/lib/index.css">
	<!-- 引入Vue和Vant的JS -->
	<script src="https://cdn.jsdelivr.net/npm/vue@2.6.14/dist/vue.min.js"></script>
	<script src="https://cdn.jsdelivr.net/npm/vant@2.12/lib/vant.min.js"></script>
	<style>
		/* 基础样式 */
		body {
			padding: 20px;
			font-family: Arial, sans-serif;
		}
		.time-btn {
			padding: 10px 20px;
			background-color: #1989fa;
			color: white;
			border: none;
			border-radius: 4px;
			font-size: 16px;
			cursor: pointer;
		}
		.time-btn:hover {
			background-color: #0e78d9;
		}
		.result {
			margin-top: 20px;
			font-size: 16px;
			color: #333;
		}
	</style>
</head>
<body>
<div id="app">
	<!-- 时间选择按钮 -->
	<button class="time-btn" @click="showPicker = true">选择时间</button>

	<!-- 选择结果展示 -->
	<div class="result" v-if="selectedTime">已选择：{{ selectedTime }}</div>

	<!-- Vant Picker 时间选择器弹窗 -->
	<van-picker
		v-model="showPicker"
		:columns="columns"
		@confirm="onConfirm"
		@change="onColumnChange"
		title="选择日期时间"
	/>
</div>

<script>
	new Vue({
		el: '#app',
		data() {
			const now = new Date();
			return {
				// 是否显示选择器弹窗
				showPicker: false,
				// 已选择的时间
				selectedTime: '',
				// 选择器列配置（年、月、日、时、分）
				columns: [],
				// 当前时间的各维度值（用于默认选中）
				currentYear: now.getFullYear(),
				currentMonth: now.getMonth() + 1, // 月份从0开始，需+1
				currentDay: now.getDate(),
				currentHour: now.getHours(),
				currentMinute: now.getMinutes()
			};
		},
		mounted() {
			// 初始化选择器列数据
			this.initColumns();
		},
		methods: {
			// 初始化选择器列（年、月、日、时、分）
			initColumns() {
				// 1. 生成年份列（近20年，可根据需求调整）
				const yearList = [];
				const startYear = this.currentYear - 10;
				const endYear = this.currentYear + 10;
				for (let i = startYear; i <= endYear; i++) {
					yearList.push(i + '年');
				}

				// 2. 生成月份列（1-12月）
				const monthList = Array.from({ length: 12 }, (_, i) => (i + 1) + '月');

				// 3. 生成日期列（根据当前年月计算天数）
				const dayList = this.getDayList(this.currentYear, this.currentMonth);

				// 4. 生成小时列（0-23时）
				const hourList = Array.from({ length: 24 }, (_, i) => this.formatNum(i) + '时');

				// 5. 生成分钟列（0-59分）
				const minuteList = Array.from({ length: 60 }, (_, i) => this.formatNum(i) + '分');

				// 组装列数据
				this.columns = [
					{ values: yearList, defaultIndex: yearList.indexOf(this.currentYear + '年') },
					{ values: monthList, defaultIndex: monthList.indexOf(this.currentMonth + '月') },
					{ values: dayList, defaultIndex: dayList.indexOf(this.currentDay + '日') },
					{ values: hourList, defaultIndex: hourList.indexOf(this.formatNum(this.currentHour) + '时') },
					{ values: minuteList, defaultIndex: minuteList.indexOf(this.formatNum(this.currentMinute) + '分') }
				];
			},

			// 根据年、月获取对应天数（处理2月、闰月）
			getDayList(year, month) {
				const dayCount = new Date(year, month, 0).getDate(); // 当月最后一天的日期 = 当月总天数
				return Array.from({ length: dayCount }, (_, i) => (i + 1) + '日');
			},

			// 数字补零（比如 9 → 09）
			formatNum(num) {
				return num.toString().padStart(2, '0');
			},

			// 列切换时的联动处理（比如切换月份后，日期列要更新）
			onColumnChange(picker, index, value) {
				// 只有年份或月份改变时，需要更新日期列
				if (index === 0 || index === 1) {
					// 提取当前选中的年、月
					const selectedYear = parseInt(this.columns[0].values[picker.getColumnIndex(0)].replace('年', ''));
					const selectedMonth = parseInt(this.columns[1].values[picker.getColumnIndex(1)].replace('月', ''));
					// 重新生成日期列
					const newDayList = this.getDayList(selectedYear, selectedMonth);
					// 更新日期列数据
					picker.setColumnValues(2, newDayList);
				}
			},

			// 确认选择后的处理
			onConfirm(values) {
				// 解析选中的时间值（去掉单位，格式化）
				const year = values[0].replace('年', '');
				const month = this.formatNum(values[1].replace('月', ''));
				const day = this.formatNum(values[2].replace('日', ''));
				const hour = values[3].replace('时', '');
				const minute = values[4].replace('分', '');
				// 拼接成标准时间格式
				this.selectedTime = `${year}-${month}-${day} ${hour}:${minute}`;
				// 关闭选择器
				this.showPicker = false;
			}
		}
	});
</script>
</body>
</html>
